name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create production env file from GitHub secrets
        run: |
          cat > .env.production <<'EOF'
          VITE_BACK4APP_APP_ID=${{ secrets.VITE_BACK4APP_APP_ID }}
          VITE_BACK4APP_JAVASCRIPT_KEY=${{ secrets.VITE_BACK4APP_JAVASCRIPT_KEY }}
          VITE_BACK4APP_SERVER_URL=${{ secrets.VITE_BACK4APP_SERVER_URL }}
          EOF

      - name: Build production site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
